<header class="app-header">
  <div class="header-left">
    <button class="menu-toggle" (click)="onToggleSidebar()" aria-label="Toggle sidebar">
      ☰
    </button>
    <a routerLink="/" class="brand">
      <span class="brand-name">ENyay</span>
    </a>
  </div>

  <div class="header-right">
    <button class="theme-toggle" (click)="onToggleTheme()" aria-label="Toggle theme">
      {{ (themeService.theme$ | async) === 'dark' ? '☀️' : '🌙' }}
    </button>
    <div class="user-menu">
      <span class="user-avatar">U</span>
    </div>
  </div>
</header>
