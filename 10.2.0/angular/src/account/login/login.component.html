<div [@routerTransition]>
    <h4 class="text-center mb-3">{{ 'LogIn' | localize }}</h4>

    <div class="btn-group btn-group-toggle d-flex mb-3" role="group">
        <button
            type="button"
            class="btn"
            [class.btn-primary]="loginMode === 'admin'"
            [class.btn-outline-primary]="loginMode !== 'admin'"
            (click)="loginMode = 'admin'">
            <i class="fas fa-user-shield"></i>
            Jail Admin
        </button>
        <button
            type="button"
            class="btn"
            [class.btn-primary]="loginMode === 'inmate'"
            [class.btn-outline-primary]="loginMode !== 'inmate'"
            (click)="loginMode = 'inmate'">
            <i class="fas fa-user-lock"></i>
            Inmate
        </button>
    </div>

    @if (loginMode === 'admin') {
        <form novalidate autocomplete="off" #loginForm="ngForm" (ngSubmit)="login()">
            <div class="form-group">
                <div class="input-group">
                    <input
                        type="text"
                        class="form-control"
                        name="userNameOrEmailAddress"
                        [(ngModel)]="authService.authenticateModel.userNameOrEmailAddress"
                        [placeholder]="'UserNameOrEmail' | localize"
                        required
                        maxlength="256"
                        #userNameOrEmailAddressModel="ngModel"
                        #userNameOrEmailAddressEl />
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-user"></span>
                        </div>
                    </div>
                </div>
                <abp-validation-summary
                    [control]="userNameOrEmailAddressModel"
                    [controlEl]="userNameOrEmailAddressEl"></abp-validation-summary>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        [(ngModel)]="authService.authenticateModel.password"
                        [placeholder]="'Password' | localize"
                        required
                        maxlength="32"
                        #passwordModel="ngModel"
                        #passwordEl />
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <abp-validation-summary [control]="passwordModel" [controlEl]="passwordEl"></abp-validation-summary>
            </div>
            <div class="form-group row">
                <div class="col-md-8">
                    <div class="custom-control custom-checkbox">
                        <input
                            type="checkbox"
                            class="custom-control-input"
                            id="rememberMe"
                            name="rememberMe"
                            [(ngModel)]="authService.rememberMe" />
                        <label for="rememberMe" class="custom-control-label">
                            {{ 'RememberMe' | localize }}
                        </label>
                    </div>
                </div>
                <div class="col-md-4">
                    <button
                        type="submit"
                        class="btn btn-primary btn-block"
                        [disabled]="!loginForm.form.valid || submitting">
                        {{ 'LogIn' | localize }}
                    </button>
                </div>
            </div>
        </form>
        @if (isSelfRegistrationAllowed) {
            <p class="mb-1">
                <a [routerLink]="['../register']">
                    <i class="fa fa-plus-circle"></i>
                    {{ 'Register' | localize }}
                </a>
            </p>
        }
    }

    @if (loginMode === 'inmate') {
        <form novalidate autocomplete="off" (ngSubmit)="inmateLogin()">
            <div class="form-group">
                <label>Prison ID</label>
                <div class="input-group">
                    <input
                        type="text"
                        class="form-control"
                        name="prisonId"
                        [(ngModel)]="prisonId"
                        placeholder="Enter your Prison ID"
                        required
                        maxlength="64"
                        [appAutofocus]="loginMode === 'inmate'" />
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-id-card"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <button type="button" class="btn btn-outline-secondary btn-block" title="Capture biometric (mock)">
                        <i class="fas fa-fingerprint"></i>
                        Biometric
                    </button>
                </div>
                <div class="col-6">
                    <button type="button" class="btn btn-outline-secondary btn-block" title="Capture face (mock)">
                        <i class="fas fa-camera"></i>
                        Face
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting">
                <i class="fas fa-sign-in-alt"></i>
                Login
            </button>
        </form>
    }
</div>
