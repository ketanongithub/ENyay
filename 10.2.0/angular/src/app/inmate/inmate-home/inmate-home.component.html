<div [@routerTransition]>
    <h2 class="mb-4" style="color: #0d3b66; font-weight: 600">Welcome to Nyay Setu</h2>

    <div class="row">
        <!-- Card 1: Audio Call -->
        <div class="col-lg-4 col-md-6 mb-4">
            <div
                class="p-4 rounded shadow-sm h-100"
                style="background: linear-gradient(135deg, #e3f2fd, #bbdefb); border-radius: 16px">
                <div class="text-center mb-3">
                    <div
                        class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 64px; height: 64px; background: #1976d2; color: white">
                        <i class="fas fa-phone-alt fa-2x"></i>
                    </div>
                </div>
                <h4 class="text-center mb-3" style="color: #0d3b66">Audio Call</h4>
                <div class="form-group">
                    <label>Prison ID</label>
                    <input type="text" class="form-control" name="audioPrisonId" [(ngModel)]="prisonId" />
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" name="audioPhone" [(ngModel)]="contactNumber" />
                </div>
                <button type="button" class="btn btn-success btn-block" (click)="dialAudio()">
                    <i class="fas fa-phone"></i>
                    Dial Audio Call
                </button>
            </div>
        </div>

        <!-- Card 2: Biometric -->
        <div class="col-lg-4 col-md-6 mb-4">
            <div
                class="p-4 rounded shadow-sm h-100 text-center"
                style="background: linear-gradient(135deg, #fff8e1, #ffe082); border-radius: 16px">
                <div class="mb-3">
                    <div
                        class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 64px; height: 64px; background: #f9a825; color: white">
                        <i class="fas fa-fingerprint fa-2x"></i>
                    </div>
                </div>
                <h4 class="mb-3" style="color: #5d4037">Biometric</h4>
                <p class="text-muted">Verify your identity using your thumbprint.</p>
                <button type="button" class="btn btn-warning btn-block" (click)="scanThumbprint()">
                    <i class="fas fa-fingerprint"></i>
                    Scan Thumbprint
                </button>
                @if (biometricVerified) {
                    <div class="mt-3 text-success">
                        <i class="fas fa-check-circle"></i>
                        Verified
                    </div>
                }
            </div>
        </div>

        <!-- Card 3: Face Recognition / Video -->
        <div class="col-lg-4 col-md-6 mb-4">
            <div
                class="p-4 rounded shadow-sm h-100 text-center"
                style="background: linear-gradient(135deg, #e8f5e9, #a5d6a7); border-radius: 16px">
                <div class="mb-3">
                    <div
                        class="mx-auto rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 64px; height: 64px; background: #2e7d32; color: white">
                        <i class="fas fa-user-circle fa-2x"></i>
                    </div>
                </div>
                <h4 class="mb-3" style="color: #1b5e20">Face Recognition</h4>
                <p class="text-muted">Start a verified video call with your family.</p>
                <button type="button" class="btn btn-primary btn-block" (click)="startVideoCall()">
                    <i class="fas fa-video"></i>
                    Start Video Call
                </button>
                @if (faceVerified) {
                    <div class="mt-3 text-success">
                        <i class="fas fa-check-circle"></i>
                        Verified
                    </div>
                }
            </div>
        </div>
    </div>
</div>
