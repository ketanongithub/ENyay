<aside class="app-sidebar" [class.collapsed]="isCollapsed">
  <!-- Branding -->
  <div class="sidebar-brand" *ngIf="!isCollapsed">
    <div class="brand-logo">
      <span class="logo-icon">🛡️</span>
    </div>
    <div class="brand-text">
      <span class="brand-name">eNyay Path</span>
      <span class="brand-tagline">Secure Communication for Inmates</span>
    </div>
  </div>
  <div class="sidebar-brand brand-collapsed" *ngIf="isCollapsed">
    <span class="logo-icon">🛡️</span>
  </div>

  <!-- User Info -->
  <div class="user-info" *ngIf="!isCollapsed">
    <div class="user-avatar-wrapper">
      <span class="user-avatar-icon">👤</span>
    </div>
    <span class="user-name">.\admin</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item" *ngFor="let item of navItems">
        <!-- Simple nav item (no children) -->
        <a *ngIf="!item.children"
           [routerLink]="item.route"
           routerLinkActive="active"
           class="nav-link">
          <span class="material-icon">{{ item.icon === 'dashboard' ? '⚙️' : item.icon === 'info' ? 'ℹ️' : '' }}</span>
          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
        </a>

        <!-- Parent nav item with children -->
        <div *ngIf="item.children" class="nav-parent">
          <a class="nav-link parent-link"
             [class.active]="item.isExpanded"
             (click)="toggleSubmenu(item)">
            <span class="material-icon">👥</span>
            <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
            <span class="expand-arrow" *ngIf="!isCollapsed" [class.expanded]="item.isExpanded">
              ‹
            </span>
          </a>

          <!-- Submenu -->
          <ul class="submenu" *ngIf="item.isExpanded && !isCollapsed">
            <li *ngFor="let child of item.children">
              <a [routerLink]="child.route"
                 routerLinkActive="active"
                 class="nav-link submenu-link">
                <span class="submenu-icon">+</span>
                <span class="nav-label">{{ child.label }}</span>
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="nav-link logout-link" (click)="logout()">
      <span class="material-icon">🚪</span>
      <span class="nav-label" *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
