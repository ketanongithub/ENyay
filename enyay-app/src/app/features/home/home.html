<div class="home-container">
  <section class="hero">
    <h1>Welcome to ENyay</h1>
    <p class="subtitle">Industry-standard Angular boilerplate with best practices</p>
  </section>

  <section class="features-grid">
    <div class="feature-card" *ngFor="let feature of features" appHighlight="#f0f9ff">
      <h3>{{ feature.title }}</h3>
      <p>{{ feature.description }}</p>
    </div>
  </section>
</div>
