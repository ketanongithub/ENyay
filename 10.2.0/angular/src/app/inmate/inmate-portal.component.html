<div class="inmate-portal-shell" style="min-height: 100vh; background: #e8f1fb">
    <nav
        class="navbar navbar-expand-lg navbar-dark"
        style="background: linear-gradient(90deg, #0d3b66, #1565c0); padding: 0.75rem 1.5rem">
        <a class="navbar-brand d-flex align-items-center" [routerLink]="['/inmate/home']">
            <i class="fas fa-balance-scale mr-2"></i>
            <span style="font-weight: 700; letter-spacing: 0.5px">Nyay Setu</span>
            <span class="ml-2 small text-light" style="opacity: 0.85">Inmate Portal</span>
        </a>
        <ul class="navbar-nav ml-auto flex-row">
            <li class="nav-item mr-3">
                <a class="nav-link text-white" [routerLink]="['/inmate/home']" routerLinkActive="font-weight-bold">
                    <i class="fas fa-home"></i>
                    Home
                </a>
            </li>
            <li class="nav-item mr-3">
                <a
                    class="nav-link text-white"
                    [routerLink]="['/inmate/my-requests']"
                    routerLinkActive="font-weight-bold">
                    <i class="fas fa-clipboard-list"></i>
                    My Requests
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="javascript:;" (click)="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </li>
        </ul>
    </nav>
    <main class="p-4">
        <router-outlet></router-outlet>
    </main>
</div>
